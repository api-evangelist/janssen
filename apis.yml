aid: janssen
name: Janssen Pharmaceuticals
description: >-
  Janssen Pharmaceuticals was a Belgian pharmaceutical company founded in
  1953 by Paul Janssen and acquired by Johnson & Johnson in 1961. The
  company specialized in psychiatry, neurology, oncology, immunology, and
  infectious disease medicines, developing approximately 70 new active
  pharmaceutical substances over its history. In 2024 the Janssen brand was
  retired and the pharmaceutical operations were rebranded as Johnson &
  Johnson Innovative Medicine. As such, Janssen no longer operates as a
  standalone brand and does not maintain its own public APIs.
